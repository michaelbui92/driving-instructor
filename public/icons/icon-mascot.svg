<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Chibi face - larger version -->
  <circle cx="256" cy="256" r="160" fill="#FFE4CC"/>
  
  <!-- Hair - simplified but recognizable -->
  <ellipse cx="256" cy="160" rx="128" ry="64" fill="#4A3728"/>
  
  <!-- Big eyes -->
  <circle cx="206" cy="240" r="40" fill="white"/>
  <circle cx="306" cy="240" r="40" fill="white"/>
  
  <!-- Pupils -->
  <circle cx="216" cy="250" r="24" fill="#2D1810"/>
  <circle cx="316" cy="250" r="24" fill="#2D1810"/>
  
  <!-- Eye shine -->
  <circle cx="226" cy="230" r="16" fill="white"/>
  <circle cx="326" cy="230" r="16" fill="white"/>
  
  <!-- Rosy cheeks -->
  <circle cx="150" cy="280" r="30" fill="#FFB5B5" opacity="0.6"/>
  <circle cx="362" cy="280" r="30" fill="#FFB5B5" opacity="0.6"/>
  
  <!-- Big happy smile -->
  <path d="M180 320 Q256 380 332 320" stroke="#D4A574" stroke-width="16" fill="none" stroke-linecap="round"/>
  
  <!-- Shirt collar peek -->
  <ellipse cx="256" cy="380" rx="80" ry="30" fill="#93C5FD"/>
  <circle cx="220" cy="370" r="10" fill="white" opacity="0.7"/>
  <circle cx="256" cy="375" r="10" fill="white" opacity="0.7"/>
  <circle cx="292" cy="370" r="10" fill="white" opacity="0.7"/>
</svg>
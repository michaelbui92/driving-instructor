<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Chibi face - skin -->
  <ellipse cx="256" cy="240" rx="160" ry="150" fill="#FFE4CC"/>
  
  <!-- Hair - dark brown messy style -->
  <path d="M120 200 Q100 100 200 80 Q256 60 312 80 Q400 100 380 200 Q390 160 350 140 Q300 100 256 100 Q200 100 160 140 Q120 160 120 200" fill="#4A3728"/>
  <path d="M130 180 Q140 120 180 110 Q200 100 160 130 Z" fill="#4A3728"/>
  <path d="M350 180 Q340 120 300 110 Q280 100 320 130 Z" fill="#4A3728"/>
  
  <!-- Big eyes - white -->
  <ellipse cx="195" cy="230" rx="50" ry="55" fill="white"/>
  <ellipse cx="317" cy="230" rx="50" ry="55" fill="white"/>
  
  <!-- Pupils - dark -->
  <ellipse cx="200" cy="235" rx="30" ry="35" fill="#2D1810"/>
  <ellipse cx="322" cy="235" rx="30" ry="35" fill="#2D1810"/>
  
  <!-- Eye shine -->
  <circle cx="212" cy="220" r="12" fill="white"/>
  <circle cx="334" cy="220" r="12" fill="white"/>
  
  <!-- Rosy cheeks -->
  <ellipse cx="130" cy="270" rx="30" ry="20" fill="#FFB5B5" opacity="0.6"/>
  <ellipse cx="382" cy="270" rx="30" ry="20" fill="#FFB5B5" opacity="0.6"/>
  
  <!-- Big happy smile -->
  <path d="M200 300 Q256 360 312 300" stroke="#D4A574" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Shirt collar peek at bottom - light blue with dots -->
  <path d="M176 380 L200 420 L256 430 L312 420 L336 380 Q256 400 176 380" fill="#93C5FD"/>
  <circle cx="220" cy="395" r="6" fill="white" opacity="0.7"/>
  <circle cx="256" cy="405" r="6" fill="white" opacity="0.7"/>
  <circle cx="292" cy="395" r="6" fill="white" opacity="0.7"/>
</svg>

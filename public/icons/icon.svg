<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="white">
    <!-- Steering wheel -->
    <circle cx="256" cy="256" r="140" fill="none" stroke="white" stroke-width="32"/>
    <circle cx="256" cy="256" r="45" fill="white"/>
    <!-- Wheel spokes -->
    <rect x="246" y="116" width="20" height="80" fill="white"/>
    <rect x="246" y="316" width="20" height="80" fill="white"/>
    <rect x="116" y="246" width="80" height="20" fill="white"/>
    <rect x="316" y="246" width="80" height="20" fill="white"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Car body (larger for 512x512) -->
  <rect x="96" y="192" width="320" height="128" rx="32" fill="#1F2937"/>
  
  <!-- Car top/windshield -->
  <path d="M160 192 L256 64 L352 192" fill="#374151"/>
  
  <!-- Wheels -->
  <circle cx="160" cy="352" r="48" fill="#111827"/>
  <circle cx="352" cy="352" r="48" fill="#111827"/>
  
  <!-- Wheel highlights -->
  <circle cx="160" cy="352" r="24" fill="#6B7280"/>
  <circle cx="352" cy="352" r="24" fill="#6B7280"/>
  
  <!-- Headlights -->
  <circle cx="416" cy="256" r="24" fill="#FBBF24"/>
  <circle cx="96" cy="256" r="24" fill="#FBBF24"/>
  
  <!-- Side window -->
  <rect x="176" y="128" width="160" height="64" rx="16" fill="#60A5FA"/>
  
  <!-- License plate area -->
  <rect x="208" y="288" width="96" height="32" rx="8" fill="#4B5563"/>
  <text x="256" y="312" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">BU1</text>
</svg>
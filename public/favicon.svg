<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- Simplified chibi face (optimized for small size) -->
  <circle cx="16" cy="16" r="10" fill="#FFE4CC"/>
  
  <!-- Hair - simplified -->
  <ellipse cx="16" cy="10" rx="8" ry="4" fill="#4A3728"/>
  
  <!-- Eyes - simplified -->
  <circle cx="13" cy="15" r="2" fill="white"/>
  <circle cx="19" cy="15" r="2" fill="white"/>
  <circle cx="13.5" cy="15.5" r="1" fill="#2D1810"/>
  <circle cx="19.5" cy="15.5" r="1" fill="#2D1810"/>
  
  <!-- Cheeks - simplified -->
  <circle cx="10" cy="17" r="1.5" fill="#FFB5B5" opacity="0.6"/>
  <circle cx="22" cy="17" r="1.5" fill="#FFB5B5" opacity="0.6"/>
  
  <!-- Smile - simplified -->
  <path d="M12 20 Q16 22 20 20" stroke="#D4A574" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>